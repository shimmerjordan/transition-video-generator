project:
  fps: 30
  resolution:
  - 1280
  - 720
  transition: hard_cut
  transition_frames: 5
providers:
  matte: local
  cleanup: local
  ground: local
  garment: local
  relight: local
input:
  source: ../source/dance.mp4
  music: data/input/music.wav
  backgrounds_dir: ../source
  garments_dir: ../source
persons:
- id: p0
  name: 男舞者
  seed_point:
  - 685
  - 330
  box:
  - 981
  - 289
  - 1059
  - 589
- id: p1
  name: 女舞者
  seed_point:
  - 815
  - 360
  box:
  - 477
  - 306
  - 551
  - 618
garments:
  cloth1: cloth1.jpg
  cloth2: cloth2.jpg
backgrounds:
  meadow:
    file: bg1.mp4
    clips:
    - id: meadow_a
      range:
      - 10
      - 17.6
    - id: meadow_b
      range:
      - 52.7
      - 62.7
    cleanup:
      watermarks:
      - - 1058
        - 22
        - 1260
        - 72
      subtitles:
      - - 0
        - 640
        - 1280
        - 720
      movers: []
      regions: []
      marks:
      - id: mark0
        kind: watermarks
        range:
        - 0
        - 143
        rect:
        - 1051
        - 16
        - 1263
        - 75
  night:
    file: bg2.mp4
    clips:
    - id: night_a
      range:
      - 2
      - 10
    cleanup:
      watermarks:
      - - 0
        - 10
        - 180
        - 60
      subtitles: []
beats:
  detect: auto
  subdivide: 1
  override_seconds: []
  include_start_end: true
segments:
- id: 0
  background_clip: meadow_a
  ground: as_is
  garments:
    p1: cloth1
  light:
    direction: auto
    color_temp: auto
    intensity: auto
  time:
  - 0
  - 5
- id: 1
  time:
  - 5
  - 10
  background_clip: meadow_b
  ground: as_is
  garments: {}
  light:
    direction: auto
    color_temp: auto
    intensity: auto
camera:
  mode: locked
  overscan: 0.12
segment:
  method: sam2
  sam2_model: large
  refine: matanyone
  diff_thresh: 28
dewatermark:
  engine: lama
  model: Lykon/dreamshaper-8-inpainting
  size: 512
  steps: 25
  guidance: 8
  prompt: clean background, seamless, photorealistic, empty
  negative: text, letters, words, watermark, logo, characters, signature, writing,
    symbols, numbers
relight:
  fallback: soft_match
  soft_strength: 0.25
compositing:
  defringe: true
  defringe_band: 6
  edge_erode: 1
  light_wrap: true
  light_wrap_amount: 0.5
  light_wrap_width: 4
  contact_shadow: true
  shadow_strength: 0.45
  shadow_blur: 9
  grain: true
  grain_sigma: 3
  match_color: true
  match_strength: 0.25
  bg_blur: 0
  feather_px: 2
models:
  sam2: models/sam2/sam2.1_hiera_base_plus.pt
  sam2_cfg: configs/sam2.1/sam2.1_hiera_b+.yaml
  ic_light: models/ic-light
  controlnet_pose: models/controlnet-openpose
  controlnet_depth: models/controlnet-depth
runtime:
  device: cuda
  low_vram: true
  infer_scale: 1
webui:
  host: 127.0.0.1
  port: 8800
