# transition-video-generator 中枢配置(模板)
# 实现各步骤后,此文件驱动全片一键复算。

project:
  fps: 30                      # 源片帧率(实现时读取并校正)
  resolution: [1920, 1080]    # 目标分辨率
  subjects: 2                  # 主体数量(通用:1=单人,2=双人...)
  enable_garment_swap: true   # 是否换装(可关)
  enable_relight: true        # 是否重打光(可关)
  transition: hard_cut        # 转场方式:hard_cut | crossfade | mask_wipe

input:
  source: data/input/source.mp4
  music: data/input/music.wav
  backgrounds_dir: data/input/backgrounds
  garments_dir: data/input/garments

# 运镜处理(源片可能有视角移动):在锁定域合成,最后把源片运镜贴回成片。
camera:
  mode: auto                  # auto=自动判定 | locked=固定机位跳过 | motion_2d=2D反贴(默认策略) | motion_3d=三维解算(强视差)
  exclude_subjects: true      # 跟踪相机时用主体 mask 排除舞者区域
  overscan: 0.12              # 背景/合成预留余量(占比),贴回运镜后裁掉,防边缘露空
  motion3d:
    solver: colmap            # motion_3d 时的相机解算器:colmap | droid_slam
    depth: monocular          # 深度来源,用于深度平面重投影产生视差

beats:
  detect: auto                # auto = librosa 自动卡点;manual = 用下方 override
  subdivide: 1                # 每 N 拍切一次(1=每拍,2=隔拍)
  override_seconds: []        # 手动卡点时间戳(秒),非空则覆盖自动结果

# 每个节拍段的映射:背景素材、衣服参考图、光照目标。
# 段数 = 卡点数;person_a/person_b 分别对应两位舞者的衣服参考图。
segments:
  - id: 0
    background: backgrounds/clip_01.mp4   # 该段背景素材(相对 backgrounds_dir)
    bg_trim: [0.0, null]                  # 取素材的 [起, 止] 秒(null=自动按段长)
    garment_a: garments/a_outfit_01.png
    garment_b: garments/b_outfit_01.png
    light:
      direction: auto         # auto=从背景估计;或如 [azimuth_deg, elevation_deg]
      color_temp: auto        # auto 或开尔文值,如 5600
      intensity: auto

  # - id: 1
  #   background: backgrounds/clip_02.mp4
  #   ...

compositing:
  light_wrap: true
  contact_shadow: true
  grain: true
  match_color: true           # 人物层向背景层统一调色
  feather_px: 2               # 抠像边缘羽化

models:
  sam2: models/sam2
  ic_light: models/ic-light
  controlnet_pose: models/controlnet-openpose
  controlnet_depth: models/controlnet-depth

runtime:
  device: cuda
  low_vram: true              # 开启 cpu offload / attention slicing
  infer_scale: 1.0            # <1 降分辨率推理后上采样(省显存)
